<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Orbital Radar</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet"/>
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#050c14;
    --surface:#071220;
    --ring:#0e3a52;
    --ring-label:#1a6a8a;
    --sweep:#00e5c8;
    --sweep-glow:rgba(0,229,200,0.18);
    --teal:#00e5c8;
    --teal-dim:rgba(0,229,200,0.35);
    --amber:#f5a623;
    --coral:#ff6b6b;
    --blue:#4db8ff;
    --purple:#c084fc;
    --text-primary:#e2f0f7;
    --text-muted:#4a7a96;
    --text-dim:#1e4a62;
    --panel-bg:#060f1a;
    --tab-active:#00e5c8;
    --border:#0e2a3a;
  }
  html,body{width:100%;height:100%;background:var(--bg);color:var(--text-primary);font-family:'Space Mono',monospace;font-size:12px;overflow:hidden}
  #app{display:flex;flex-direction:column;height:100vh;width:100%;position:relative}

  #radar-wrap{flex:0 0 60%;position:relative;overflow:hidden}

  canvas#stars{position:absolute;inset:0;z-index:0}
  canvas#radar{position:absolute;inset:0;z-index:1}

  #overlay{position:absolute;top:14px;left:14px;z-index:10;display:flex;flex-direction:column;gap:6px}
  .counter{display:flex;align-items:center;gap:8px;font-family:'Space Mono',monospace;font-size:10px;color:var(--text-muted)}
  .counter-dot{width:7px;height:7px;border-radius:50%}
  .counter-val{font-family:'Orbitron',monospace;font-size:13px;font-weight:700;color:var(--text-primary);margin-left:2px}

  #title-overlay{position:absolute;top:14px;right:14px;z-index:10;text-align:right}
  #title-overlay h1{font-family:'Orbitron',monospace;font-size:10px;font-weight:400;letter-spacing:.25em;color:var(--teal);text-transform:uppercase;opacity:.8}
  #title-overlay p{font-size:9px;color:var(--text-muted);letter-spacing:.1em;margin-top:3px}

  #time-overlay{position:absolute;bottom:14px;right:14px;z-index:10;text-align:right;font-family:'Orbitron',monospace;font-size:11px;color:var(--text-muted);letter-spacing:.1em}

  #panel{flex:1;background:var(--panel-bg);border-top:1px solid var(--border);display:flex;flex-direction:column;overflow:hidden;position:relative;z-index:20}

  #tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
  .tab{flex:1;padding:10px 0;text-align:center;font-family:'Orbitron',monospace;font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--text-muted);cursor:pointer;border-bottom:2px solid transparent;transition:color .2s,border-color .2s}
  .tab.active{color:var(--tab-active);border-bottom-color:var(--tab-active)}
  .tab:hover:not(.active){color:var(--text-primary)}

  #panel-content{flex:1;overflow-y:auto;padding:12px 14px}
  #panel-content::-webkit-scrollbar{width:3px}
  #panel-content::-webkit-scrollbar-track{background:transparent}
  #panel-content::-webkit-scrollbar-thumb{background:var(--ring);border-radius:2px}

  .pass-card{border:1px solid var(--border);border-radius:4px;padding:10px 12px;margin-bottom:8px;background:#07111c;display:flex;align-items:center;gap:12px}
  .pass-card:last-child{margin-bottom:0}
  .pass-el-bar{width:3px;flex-shrink:0;border-radius:2px;align-self:stretch}
  .pass-info{}
  .pass-sat{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;color:var(--text-primary);letter-spacing:.1em;margin-bottom:4px}
  .pass-time{color:var(--text-muted);font-size:10px;margin-bottom:3px}
  .pass-meta{display:flex;gap:12px;font-size:9px;color:var(--text-dim)}
  .pass-el-val{font-family:'Orbitron',monospace;font-size:11px;font-weight:700;margin-left:auto;align-self:center;white-space:nowrap}

  .filter-row{display:flex;align-items:center;justify-content:space-between;padding:9px 0;border-bottom:1px solid var(--border)}
  .filter-row:last-child{border-bottom:none}
  .filter-label{display:flex;align-items:center;gap:8px;font-size:10px;color:var(--text-primary);letter-spacing:.05em}
  .filter-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .filter-count{font-size:9px;color:var(--text-muted);margin-left:4px}
  .toggle{width:32px;height:18px;background:#0e2a3a;border-radius:9px;position:relative;cursor:pointer;transition:background .2s;border:1px solid var(--border)}
  .toggle.on{background:var(--teal)}
  .toggle::after{content:'';position:absolute;width:12px;height:12px;border-radius:50%;background:var(--bg);top:2px;left:2px;transition:left .2s}
  .toggle.on::after{left:16px;background:#fff}

  #tooltip{position:absolute;z-index:50;background:#060f1a;border:1px solid var(--teal-dim);border-radius:4px;padding:7px 10px;pointer-events:none;opacity:0;transition:opacity .15s;font-family:'Space Mono',monospace;font-size:10px;color:var(--text-primary);white-space:nowrap;min-width:130px}
  #tooltip.show{opacity:1}
  #tooltip .tt-name{font-family:'Orbitron',monospace;font-size:10px;font-weight:700;margin-bottom:4px;letter-spacing:.1em}
  #tooltip .tt-row{display:flex;justify-content:space-between;gap:16px;color:var(--text-muted);margin-top:2px}
  #tooltip .tt-val{color:var(--text-primary)}
</style>
</head>
<body>
<div id="app">
  <div id="radar-wrap">
    <canvas id="stars"></canvas>
    <canvas id="radar"></canvas>
    <div id="overlay">
      <div class="counter"><span class="counter-dot" style="background:#00e5c8"></span>TRACKED<span class="counter-val" id="cnt-tracked">0</span></div>
      <div class="counter"><span class="counter-dot" style="background:#f5a623"></span>IN PASS<span class="counter-val" id="cnt-pass">0</span></div>
      <div class="counter"><span class="counter-dot" style="background:#ff6b6b"></span>DEBRIS<span class="counter-val" id="cnt-debris">0</span></div>
    </div>
    <div id="title-overlay">
      <h1>Orbital Radar</h1>
      <p id="loc-label">49.1°N 122.8°W</p>
    </div>
    <div id="time-overlay"></div>
    <div id="tooltip">
      <div class="tt-name" id="tt-name"></div>
      <div class="tt-row"><span>EL</span><span class="tt-val" id="tt-el"></span></div>
      <div class="tt-row"><span>AZ</span><span class="tt-val" id="tt-az"></span></div>
      <div class="tt-row"><span>ALT</span><span class="tt-val" id="tt-alt"></span></div>
      <div class="tt-row"><span>CAT</span><span class="tt-val" id="tt-cat"></span></div>
    </div>
  </div>

  <div id="panel">
    <div id="tabs">
      <div class="tab active" id="tab-passes" onclick="switchTab('passes')">Passes</div>
      <div class="tab" id="tab-filter" onclick="switchTab('filter')">Filter</div>
    </div>
    <div id="panel-content"></div>
  </div>
</div>

<script>
// ── DATA ─────────────────────────────────────────────────────────────────────
// MOCK DATA — swap each object's el/az/alt with predict_look_angles() output
// and pass fields with find_passes() output. One call per satellite.

const CATS = {
  iss:     { label: 'Space Stations', color: '#00e5c8', active: true  },
  weather: { label: 'Weather',        color: '#4db8ff', active: true  },
  nav:     { label: 'Navigation',     color: '#f5a623', active: true  },
  comm:    { label: 'Communications', color: '#c084fc', active: true  },
  debris:  { label: 'Debris',         color: '#ff6b6b', active: false },
};

const SATS = [
  { id:'ISS',  name:'ISS (ZARYA)',     cat:'iss',     el:42, az:127, alt:408,   rising:true,  pass:{ start:'19:14', end:'19:21', maxEl:67 } },
  { id:'GOES', name:'GOES-18',         cat:'weather', el:18, az:218, alt:35786, rising:false, pass:{ start:'20:05', end:'20:09', maxEl:22 } },
  { id:'GP1',  name:'GPS IIF-3',       cat:'nav',     el:55, az:74,  alt:20200, rising:true,  pass:{ start:'18:58', end:'19:30', maxEl:55 } },
  { id:'GP2',  name:'GPS IIIA-4',      cat:'nav',     el:31, az:300, alt:20200, rising:false, pass:{ start:'21:12', end:'21:44', maxEl:48 } },
  { id:'SXM',  name:'Starlink-1234',   cat:'comm',    el:8,  az:44,  alt:550,   rising:true,  pass:{ start:'22:01', end:'22:04', maxEl:12 } },
  { id:'SXM2', name:'Starlink-5678',   cat:'comm',    el:72, az:170, alt:550,   rising:true,  pass:{ start:'18:52', end:'18:58', maxEl:72 } },
  { id:'DEB1', name:'COSMOS 2251 DEB', cat:'debris',  el:14, az:330, alt:790,   rising:false, pass:{ start:'23:15', end:'23:17', maxEl:16 } },
  { id:'AMZ',  name:'OneWeb-0334',     cat:'comm',    el:38, az:255, alt:1200,  rising:true,  pass:{ start:'20:33', end:'20:38', maxEl:41 } },
];

// ── STATE ─────────────────────────────────────────────────────────────────────
let activeTab  = 'passes';
let sweepAngle = 0;
let hoveredSat = null;
const catFilters = Object.fromEntries(
  Object.entries(CATS).map(([k, v]) => [k, { ...v }])
);

// ── CANVAS SETUP ──────────────────────────────────────────────────────────────
const radarWrap = document.getElementById('radar-wrap');
const starsC    = document.getElementById('stars');
const radarC    = document.getElementById('radar');
const sCtx      = starsC.getContext('2d');
const rCtx      = radarC.getContext('2d');
const tooltip   = document.getElementById('tooltip');

let W, H, cx, cy, R, stars = [];

function resize() {
  W = radarWrap.offsetWidth;
  H = radarWrap.offsetHeight;
  starsC.width = radarC.width = W;
  starsC.height = radarC.height = H;
  cx = W / 2;
  cy = H / 2;
  R  = Math.min(W, H) * 0.42;
  generateStars();
  drawStars();
}

function generateStars() {
  stars = [];
  const n = Math.floor(W * H / 1200);
  for (let i = 0; i < n; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.1 + 0.2,
      a: Math.random() * 0.6 + 0.1,
    });
  }
}

function drawStars() {
  sCtx.clearRect(0, 0, W, H);
  for (const s of stars) {
    sCtx.beginPath();
    sCtx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sCtx.fillStyle = `rgba(180,220,255,${s.a})`;
    sCtx.fill();
  }
}

// ── COORDINATE CONVERSION ─────────────────────────────────────────────────────
// az=0 is North, elevation=0 is horizon, elevation=90 is zenith (centre)
function azelToXY(az, el) {
  const dist = R * (1 - el / 90);
  const rad  = (az - 90) * Math.PI / 180;
  return { x: cx + dist * Math.cos(rad), y: cy + dist * Math.sin(rad) };
}

// ── DRAW FUNCTIONS ────────────────────────────────────────────────────────────
function drawFrame() {
  // Elevation rings: horizon (0°), 30°, 60°, zenith (90°)
  const rings  = [0, 30, 60, 90];
  const labels = ['HRZ', '30°', '60°', 'ZEN'];

  rings.forEach((el, i) => {
    const r = R * (1 - el / 90);
    rCtx.beginPath();
    rCtx.arc(cx, cy, r, 0, Math.PI * 2);
    rCtx.strokeStyle = i === 0 ? '#0e3a52' : '#0a2a3d';
    rCtx.lineWidth   = i === 0 ? 1.5 : 0.8;
    rCtx.stroke();
    if (i < 3) {
      rCtx.font      = '9px "Space Mono"';
      rCtx.fillStyle = '#1a5a78';
      rCtx.fillText(labels[i], cx + r + 4, cy - 3);
    }
  });

  // Cross hairs
  rCtx.strokeStyle = '#0a2a3d';
  rCtx.lineWidth   = 0.5;
  for (let a = 0; a < 360; a += 90) {
    const rad = (a - 90) * Math.PI / 180;
    rCtx.beginPath();
    rCtx.moveTo(cx, cy);
    rCtx.lineTo(cx + R * Math.cos(rad), cy + R * Math.sin(rad));
    rCtx.stroke();
  }

  // Cardinal labels
  const dirs = [['N', 0], ['E', 90], ['S', 180], ['W', 270]];
  rCtx.font          = '10px "Orbitron"';
  rCtx.textAlign     = 'center';
  rCtx.textBaseline  = 'middle';
  dirs.forEach(([d, a]) => {
    const rad = (a - 90) * Math.PI / 180;
    rCtx.fillStyle = '#1a6a8a';
    rCtx.fillText(d, cx + (R + 16) * Math.cos(rad), cy + (R + 16) * Math.sin(rad));
  });
  rCtx.textAlign    = 'left';
  rCtx.textBaseline = 'alphabetic';
}

function drawSweep() {
  const trailArc = Math.PI * 0.55;
  const steps    = 40;

  // Fading trail
  for (let i = 0; i < steps; i++) {
    const t      = i / steps;
    const startA = sweepAngle - trailArc * (1 - t);
    const endA   = sweepAngle - trailArc * (1 - t - 1 / steps);
    rCtx.beginPath();
    rCtx.moveTo(cx, cy);
    rCtx.arc(cx, cy, R, startA, endA);
    rCtx.closePath();
    rCtx.fillStyle = `rgba(0,229,200,${t * 0.08})`;
    rCtx.fill();
  }

  // Sweep line with glow
  rCtx.beginPath();
  rCtx.moveTo(cx, cy);
  rCtx.lineTo(cx + R * Math.cos(sweepAngle), cy + R * Math.sin(sweepAngle));
  rCtx.strokeStyle = '#00e5c8';
  rCtx.lineWidth   = 1.5;
  rCtx.shadowBlur  = 12;
  rCtx.shadowColor = '#00e5c8';
  rCtx.stroke();
  rCtx.shadowBlur  = 0;
}

function drawSats() {
  const visibleCats = new Set(
    Object.entries(catFilters).filter(([, v]) => v.active).map(([k]) => k)
  );

  SATS.forEach(sat => {
    if (!visibleCats.has(sat.cat)) return;

    const { x, y } = azelToXY(sat.az, sat.el);
    const color     = CATS[sat.cat].color;
    const isHovered = hoveredSat && hoveredSat.id === sat.id;
    const r         = isHovered ? 7 : 5;

    // Radial glow
    const glowGrad = rCtx.createRadialGradient(x, y, 0, x, y, r + 7);
    glowGrad.addColorStop(0, color + '55');
    glowGrad.addColorStop(1, color + '00');
    rCtx.beginPath();
    rCtx.arc(x, y, r + 7, 0, Math.PI * 2);
    rCtx.fillStyle = glowGrad;
    rCtx.fill();

    // Dot
    rCtx.beginPath();
    rCtx.arc(x, y, r, 0, Math.PI * 2);
    rCtx.fillStyle = isHovered ? '#ffffff' : color;
    rCtx.fill();

    // Rising indicator (small upward triangle above dot)
    if (sat.rising) {
      rCtx.beginPath();
      rCtx.moveTo(x,     y - r - 4);
      rCtx.lineTo(x - 3, y - r - 8);
      rCtx.lineTo(x + 3, y - r - 8);
      rCtx.closePath();
      rCtx.fillStyle = color;
      rCtx.fill();
    }

    // Label — always show when hovered, otherwise only if high elevation
    if (isHovered || sat.el > 30) {
      rCtx.font      = '8px "Space Mono"';
      rCtx.fillStyle = color;
      rCtx.fillText(sat.id, x + r + 4, y - 2);
    }
  });
}

// ── MAIN LOOP ─────────────────────────────────────────────────────────────────
function draw() {
  rCtx.clearRect(0, 0, W, H);
  drawFrame();
  drawSweep();
  drawSats();

  sweepAngle += 0.008;
  if (sweepAngle > Math.PI * 2) sweepAngle -= Math.PI * 2;

  requestAnimationFrame(draw);
}

// ── MOUSE INTERACTION ─────────────────────────────────────────────────────────
radarC.addEventListener('mousemove', e => {
  const rect = radarC.getBoundingClientRect();
  const mx   = e.clientX - rect.left;
  const my   = e.clientY - rect.top;
  const visibleCats = new Set(
    Object.entries(catFilters).filter(([, v]) => v.active).map(([k]) => k)
  );

  hoveredSat = null;
  let best   = 20;

  SATS.forEach(sat => {
    if (!visibleCats.has(sat.cat)) return;
    const { x, y } = azelToXY(sat.az, sat.el);
    const d = Math.hypot(mx - x, my - y);
    if (d < best) { best = d; hoveredSat = sat; }
  });

  if (hoveredSat) {
    document.getElementById('tt-name').textContent = hoveredSat.name;
    document.getElementById('tt-el').textContent   = hoveredSat.el + '°';
    document.getElementById('tt-az').textContent   = hoveredSat.az + '°';
    document.getElementById('tt-alt').textContent  = hoveredSat.alt.toLocaleString() + ' km';
    document.getElementById('tt-cat').textContent  = CATS[hoveredSat.cat].label;
    tooltip.style.left = Math.min(mx + 14, W - 160) + 'px';
    tooltip.style.top  = Math.min(my - 10, H - 120) + 'px';
    tooltip.classList.add('show');
  } else {
    tooltip.classList.remove('show');
  }
});

radarC.addEventListener('mouseleave', () => {
  hoveredSat = null;
  tooltip.classList.remove('show');
});

// ── PANEL ─────────────────────────────────────────────────────────────────────
window.switchTab = function(tab) {
  activeTab = tab;
  document.getElementById('tab-passes').classList.toggle('active', tab === 'passes');
  document.getElementById('tab-filter').classList.toggle('active', tab === 'filter');
  renderPanel();
};

function renderPanel() {
  const el = document.getElementById('panel-content');

  if (activeTab === 'passes') {
    const visibleCats = new Set(
      Object.entries(catFilters).filter(([, v]) => v.active).map(([k]) => k)
    );
    const upcoming = SATS
      .filter(s => visibleCats.has(s.cat))
      .sort((a, b) => a.pass.start.localeCompare(b.pass.start));

    el.innerHTML = upcoming.map(s => {
      const color   = CATS[s.cat].color;
      const elColor = s.pass.maxEl > 45 ? '#00e5c8' : s.pass.maxEl > 20 ? '#f5a623' : '#4db8ff';
      return `<div class="pass-card">
        <div class="pass-el-bar" style="background:${color};min-height:36px"></div>
        <div class="pass-info" style="flex:1">
          <div class="pass-sat" style="color:${color}">${s.name}</div>
          <div class="pass-time">${s.pass.start} → ${s.pass.end} local</div>
          <div class="pass-meta">
            <span>Max El: <b style="color:${elColor}">${s.pass.maxEl}°</b></span>
            <span>${CATS[s.cat].label}</span>
          </div>
        </div>
        <div class="pass-el-val" style="color:${elColor}">${s.pass.maxEl}°</div>
      </div>`;
    }).join('');

  } else {
    el.innerHTML = Object.entries(CATS).map(([key, cat]) => {
      const count = SATS.filter(s => s.cat === key).length;
      return `<div class="filter-row">
        <div class="filter-label">
          <div class="filter-dot" style="background:${cat.color}"></div>
          ${cat.label}
          <span class="filter-count">(${count})</span>
        </div>
        <div class="toggle ${catFilters[key].active ? 'on' : ''}" onclick="toggleCat('${key}')"></div>
      </div>`;
    }).join('');
  }
}

window.toggleCat = function(key) {
  catFilters[key].active = !catFilters[key].active;
  updateCounters();
  renderPanel();
};

// ── COUNTERS & CLOCK ──────────────────────────────────────────────────────────
function updateCounters() {
  const vis = SATS.filter(s => catFilters[s.cat].active);
  document.getElementById('cnt-tracked').textContent = vis.length;
  document.getElementById('cnt-pass').textContent    = vis.filter(s => s.el > 0).length;
  document.getElementById('cnt-debris').textContent  = vis.filter(s => s.cat === 'debris').length;
}

function updateTime() {
  const now = new Date();
  const t   = now.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: false });
  const d   = now.toLocaleDateString([], { year: 'numeric', month: 'short', day: 'numeric' });
  document.getElementById('time-overlay').textContent = `${d}  ${t} UTC`;
}

// ── INIT ──────────────────────────────────────────────────────────────────────
window.addEventListener('resize', resize);
resize();
updateCounters();
renderPanel();
updateTime();
setInterval(updateTime, 1000);
draw();
</script>
</body>
</html>
